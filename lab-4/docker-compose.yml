version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    image: postgres:15
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: >
      bash -c "
        psql postgresql://postgres:postgres@postgres:5432/library -f /migrations/01_schema.sql &&
        psql postgresql://postgres:postgres@postgres:5432/library -f /migrations/02_data.sql &&
        echo 'Migrations completed successfully'
      "

volumes:
  postgres_data:
